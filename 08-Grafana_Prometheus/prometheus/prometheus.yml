global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # - alertmanager:9093

rule_files:
  - "alert.rules.yml"

scrape_configs:

  # 🔵 Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # 🟢 Node Exporter (Linux metrics)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100"]
